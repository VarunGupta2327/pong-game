<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            background-color: #1a1a2e;
            display: block;
            margin: 0 auto;
            border: 3px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: none;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 30px;
            border-radius: 8px;
            min-width: 150px;
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .reset-btn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #764ba2;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <h1>🎮 PONG GAME</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="scoreboard">
            <div class="score-item">
                👤 Player<br>
                <span id="playerScore">0</span>
            </div>
            <div class="score-item">
                🤖 Computer<br>
                <span id="computerScore">0</span>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Move mouse up/down OR use ⬆️ ⬇️ arrow keys to control the left paddle</p>
            <p>The computer controls the right paddle. First to 10 points wins!</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleHeight = 80;
        const paddleWidth = 10;
        const ballSize = 7;

        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4.5
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize
        };

        let playerScore = 0;
        let computerScore = 0;

        const keys = {};

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = mouseY - paddleHeight / 2;
        });

        // Constrain paddle within canvas
        function constrainPaddle(paddle) {
            if (paddle.y < 0) {
                paddle.y = 0;
            }
            if (paddle.y + paddle.height > canvas.height) {
                paddle.y = canvas.height - paddle.height;
            }
        }

        // Update player position with arrow keys
        function updatePlayer() {
            if (keys['ArrowUp']) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown']) {
                player.y += player.speed;
            }
            constrainPaddle(player);
        }

        // Computer AI
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            constrainPaddle(computer);
        }

        // Ball physics
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and bottom wall collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Paddle collision detection
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = Math.abs(ball.dx);
                ball.x = player.x + player.width + ball.radius;

                // Add spin based on paddle position
                const hitPos = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy += hitPos * 3;
            }

            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -Math.abs(ball.dx);
                ball.x = computer.x - ball.radius;

                // Add spin based on paddle position
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy += hitPos * 3;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                computerScore++;
                resetBall();
            }

            if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                resetBall();
            }

            updateScoreboard();
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() * 2 - 1) * 5;
        }

        // Draw functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawNet() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function updateScoreboard() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#1a1a2e');

            // Draw center net
            drawNet();

            // Update
            updatePlayer();
            updateComputer();
            updateBall();

            // Draw
            drawRect(player.x, player.y, player.width, player.height, '#00ff88');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#ff006e');
            drawCircle(ball.x, ball.y, ball.radius, '#ffd60a');

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            resetBall();
            player.y = canvas.height / 2 - paddleHeight / 2;
            computer.y = canvas.height / 2 - paddleHeight / 2;
            updateScoreboard();
        }

        // Start game
        gameLoop();
    </script>
</body>

</html>
